/**:
  ros__parameters:
    use_sim_time: true
    frame_id: odom

    map_topic: /map
    goal_topic: /goal_pose
    odom_topic: /odom
    dynamic_obstacles_topic: /dynamic_obstacles
    path_topic: /path
    cmd_vel_topic: /cmd_vel
    subgoal_topic: /world_model_nav/subgoal
    tracked_waypoint_topic: /world_model_nav/tracked_waypoint
    robot_marker_topic: /world_model_nav/robot_footprint
    map_image_topic: /map_image

    control_frequency: 10.0
    waypoint_frequency: 10.0
    path_republish_frequency: 1.0
    map_image_frequency: 5.0
    map_image_figure_size: [8.0, 8.0]
    map_image_dpi: 120
    policy_path: ""
    device: auto
    policy_seed: 0

    lookahead_distance: 1.0
    goal_tolerance: 0.4
    robot_radius: 0.4
    robot_marker_segments: 64
    robot_marker_line_width: 0.04
    inflation_margin: 0.05
    map_occupied_threshold: 50
    treat_unknown_as_occupied: true
    dynamic_obstacle_radius: 0.5
    expected_dynamic_obstacles: 4
    min_obstacle_dt: 0.001

    controller:
      horizon: 10
      w_progress: 2.0
      w_heading: 0.8
      w_path: 1.1
      w_velocity: 0.3
      w_static: 0.5
      w_dynamic: 2.0
      static_collision_penalty: 1000000.0
      dynamic_collision_penalty: 1000000.0
      dynamic_risk_tau: 0.5
      min_clearance_clip: 0.05
      backward_penalty_enabled: true
      backward_action_name: backward
      backward_penalty: 0.25
      backward_gate_enabled: true
      dynamic_stop_clearance_threshold: 0.20
      backward_dynamic_margin: 0.10
      action_indices: [0, 1, 2, 3, 4, 5, 6]
